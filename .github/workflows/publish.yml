name: Publish Package

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Resolve package version from tag
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$tag' is not a supported semantic version tag. Use 1.2.3 or v1.2.3."
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Update pyproject.toml version
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          # The tag is the release source of truth. Patch pyproject.toml in the
          # runner so the wheel and sdist metadata match the pushed tag.
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["PACKAGE_VERSION"]
          path = Path("pyproject.toml")
          text = path.read_text()

          project = re.search(r"(?ms)^\[project\]\n(?P<body>.*?)(?=^\[|\Z)", text)
          if project is None:
              raise SystemExit("pyproject.toml does not contain a [project] table")

          body, replacements = re.subn(
              r'(?m)^version = "[^"]+"$',
              f'version = "{version}"',
              project.group("body"),
              count=1,
          )
          if replacements != 1:
              raise SystemExit("pyproject.toml [project] table must contain exactly one version field")

          path.write_text(text[: project.start("body")] + body + text[project.end("body") :])
          PY

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build source and wheel distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: pypi
      url: https://pypi.org/p/dk64-lib

    permissions:
      id-token: write

    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build
      - publish-pypi

    permissions:
      contents: write

    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.build.outputs.tag }}
        run: |
          gh release create "$RELEASE_TAG" dist/* \
            --verify-tag \
            --title "$RELEASE_TAG" \
            --generate-notes
